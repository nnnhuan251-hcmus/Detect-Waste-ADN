model:
  name: yolov8s
  type: detector_only
  description: YOLOv8s detector trained directly on 7 waste classes.

detector:
  name: yolov8s
  framework: ultralytics
  task: detect
  pretrained: true
  weights: yolov8s.pt

  detector_mode: seven_class
  num_classes: 7
  class_names:
    - plastic
    - paper
    - metal
    - glass
    - organic
    - cigarette
    - other

  input_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.50
  max_detections: 300

training_backend:
  use_ultralytics_trainer: true
