model:
  name: rtdetr_l
  type: detector_only
  description: RT-DETR-L detector trained directly on 7 waste classes.

detector:
  name: rtdetr_l
  family: rt-detr
  framework: ultralytics
  task: detect
  pretrained: true
  weights: rtdetr-l.pt

  detector_mode: seven_class
  num_classes: 7
  class_names:
    - plastic
    - paper
    - metal
    - glass
    - organic
    - cigarette
    - other

  input_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.50
  max_detections: 300

training_backend:
  preferred_backend: ultralytics
  batch_size_hint: 4
  note: "Using RT-DETR-L pretrained weights because RT-DETR-R18 pretrained weight is not verified in Ultralytics."
