model:
  name: rtdetr_r18
  type: detector_only
  description: RT-DETR-R18 detector trained directly on 7 waste classes.

detector:
  name: rtdetr_r18
  family: rt-detr
  task: detect

  backend: to_be_validated
  pretrained: true

  requested_variant: r18
  weights: null

  detector_mode: seven_class
  num_classes: 7
  class_names:
    - plastic
    - paper
    - metal
    - glass
    - organic
    - cigarette
    - other

  input_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.50
  max_detections: 300

training_backend:
  preferred_backend: ultralytics
  fallback_backend: custom_pytorch
  note: "Validate exact RT-DETR-R18 pretrained weight availability before implementing training."
