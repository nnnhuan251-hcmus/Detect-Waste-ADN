experiment:
  name: run3_freeze_cosine_warmup
  description: Strong augmentation with staged freeze/unfreeze, cosine annealing scheduler, warm-up, and gradient control.
  seed: 42

data:
  augmentation_level: strong

sampler:
  enabled: false
  name: weighted_random
  replacement: true
  num_samples_multiplier: 1.0

augmentation:
  resize: true
  normalize: true

  horizontal_flip: true
  vertical_flip: false

  # For classifier crop transform: exact orthogonal rotation only.
  # For detector: diagonal rotation must stay disabled in DetectorTrainer.
  rotate90: true
  rotate180: true

  mosaic: true
  mosaic_prob: 0.5

  color_jitter: true
  color_jitter_params:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05

  random_brightness_contrast: true

loss:
  detector_loss: native
  classifier_loss: focal_loss
  class_weighting: true

  focal_loss:
    enabled: true
    gamma: 2.0
    alpha: null
    reduction: mean

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0005

  # sửa ClassifierTrainer để tạo parameter groups cho backbone/head (cải tiến)
  # backbone_lr: 0.00001
  # head_lr: 0.0001

scheduler:
  name: cosine_annealing
  enabled: true
  warmup:
    enabled: true
    warmup_epochs: 3
    # warmup_start_lr: 0.000001
  cosine:
    min_lr: 0.000001

fine_tuning:
  pretrained: true
  train_mode: staged_finetuning
  freeze_backbone: true
  freeze_epochs: 5
  gradual_unfreeze: true
  unfreeze_schedule:
    # documentation only; current trainer derives this from freeze_epochs
    - epoch: 0
      unfreeze: classifier_head
      note: classifier head is trainable while backbone is frozen
    - epoch: 5
      unfreeze: last_blocks
    - epoch: 10
      unfreeze: full_model

gradient_control:
  enabled: true
  gradient_clipping: true
  max_norm: 10.0
  monitor_gradient_norm: true

training:
  epochs: 70
  batch_size: 16
  num_workers: 2
  mixed_precision: true
  early_stopping: true
  patience: 15

checkpoint:
  save_best: true
  monitor_detector: val_map50_95
  monitor_classifier: val_macro_f1
  mode: max

tracking:
  use_wandb: false
  mode: disabled
  project: waste-detection-adn
  entity: null
  group: ablation_study
  log_code: false
  log_model: true
  watch_model: false
  tags:
    - freeze_cosine_warmup
