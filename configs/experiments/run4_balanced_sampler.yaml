experiment:
  name: run4_balanced_sampler
  description: Strong augmentation with balanced sampling for crop classifier.
  seed: 42

data:
  augmentation_level: strong

augmentation:
  resize: true
  normalize: true

  horizontal_flip: true
  vertical_flip: false

  rotate90: true
  rotate180: true

  mosaic: true
  mosaic_prob: 0.5

  color_jitter: true
  color_jitter_params:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05

  random_brightness_contrast: true

sampler:
  enabled: true
  name: weighted_random
  replacement: true
  num_samples_multiplier: 1.0

loss:
  detector_loss: native
  classifier_loss: focal_loss
  class_weighting: false

  focal_loss:
    enabled: true
    gamma: 2.0
    alpha: null
    reduction: mean

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0005

scheduler:
  name: constant
  enabled: false

fine_tuning:
  pretrained: true
  train_mode: end_to_end
  freeze_backbone: false
  freeze_epochs: 0
  gradual_unfreeze: false

gradient_control:
  enabled: false
  gradient_clipping: false
  max_norm: 10.0
  monitor_gradient_norm: false

training:
  epochs: 50
  batch_size: 16
  num_workers: 2
  mixed_precision: true
  early_stopping: true
  patience: 10

checkpoint:
  save_best: true
  monitor_detector: val_map50_95
  monitor_classifier: val_macro_f1
  mode: max

tracking:
  use_wandb: false
  mode: disabled
  project: waste-detection-adn
  entity: null
  group: ablation
  log_code: false
  log_model: true
  watch_model: false
  tags:
    - strong_aug
    - focal_loss
    - balanced_sampler
